version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./models:/app/models:ro
      - ./backend/prediction_logs:/app/backend/prediction_logs
      - ./backend/reports:/app/backend/reports
      - ./backend/explanations:/app/backend/explanations
      - ./backend/distributed_state:/app/backend/distributed_state

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "backend/distributed_worker.py"]
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./models:/app/models:ro
      - ./backend/prediction_logs:/app/backend/prediction_logs
      - ./backend/reports:/app/backend/reports
      - ./backend/explanations:/app/backend/explanations
      - ./backend/distributed_state:/app/backend/distributed_state

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8000:80"
    depends_on:
      - backend
